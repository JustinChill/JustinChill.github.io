  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot"></script>

  <script type="text/javascript">
    // Use Promises to async request data
    var promises = [];
    var element = d3.select('figure').node();
    var width = element.getBoundingClientRect().width / 2; // get width of article so graphic is responsive
    var size = 12;

    var opinions = [
      { opinion: "No, keep rights", percent: 48 },
      { opinion: "Not sure", percent: 24 },
      { opinion: "Yes, overturn", percent: 28 }];

    // You can request multiple srcs in a promise
    myDataPromises = Promise.all(promises);

    // After data is successfully fetched, generate viz
    myDataPromises.then(function (data) {
      var opinion_bar = {
        width: width,
        style: { fontSize: size },
        marginRight: 150,
        x: {
          // tickFormat: "%Y",
          tickSize: 0,
          label: null,
          axis: null,
        },
        y: {
          grid: false,
          ticks: 3,
          tickSize: 0,
          nice: true,
          label: null,
          tickFormat: d => d + "%",
        },
        color: {
          type: "ordinal",
          range: ["#4e5f98", "#cce0eb", "#e2b346"],
          reverse: false,
        },
        marks: [
          // Plot.rectY(opinion, {x: "opinion", y: "percent", fill: "opinion"}) // title doesn't work with binX? 🤔
          Plot.ruleY([0], {
            stroke: "#ccc",
            strokeWidth: 2,
            strokeLinecap: "round"
          }),
          Plot.ruleY([25], {
            stroke: "#ccc",
            strokeWidth: 2,
            strokeLinecap: "round"
          }),
          Plot.ruleY([50], {
            stroke: "#ccc",
            strokeWidth: 2,
            strokeLinecap: "round"
          }),
          Plot.ruleY([75], {
            stroke: "#ccc",
            strokeWidth: 2,
            strokeLinecap: "round"
          }),
          Plot.ruleY([100], {
            stroke: "#ccc",
            strokeWidth: 2,
            strokeLinecap: "round"
          }),
          Plot.barY(opinions, Plot.stackX({ x: "opinion", y: "percent", fill: "opinion", title: "opinion" })),
          Plot.text(opinions, Plot.stackX({
            x: "opinion", y: "percent", text: "opinion", fontSize: 28, fontWeight: 700,
            fill: "opinion", textAnchor: "center"
          })),
        ]
      };

      document.getElementById("opinion_bar").appendChild(Plot.plot(opinion_bar));

    });
  </script>
  <script>
    // Theme toggle functionality
    const themeToggleBtn = document.getElementById("theme-toggle");
    const themeToggleLightIcon = document.getElementById("theme-toggle-light-icon");
    const themeToggleDarkIcon = document.getElementById("theme-toggle-dark-icon");

    function updateIcons(theme) {
      if (theme === "dark") {
        themeToggleLightIcon.classList.remove("hidden");
        themeToggleDarkIcon.classList.add("hidden");
      } else {
        themeToggleLightIcon.classList.add("hidden");
        themeToggleDarkIcon.classList.remove("hidden");
      }
    }

    const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
    updateIcons(currentTheme);

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener("click", () => {
        const activeTheme = document.documentElement.getAttribute("data-theme") || "light";
        const newTheme = activeTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateIcons(newTheme);
      });
    }
  </script>
