  <script>
    // Inline script to prevent FOUC (Flash of Unstyled Content) by setting the correct theme immediately
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark) ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.remove('no-js');
      document.documentElement.classList.add('js');
    })();
  </script>

    section {
      display: grid;
      align-items: center;
      justify-items: center;

      font: 1.5rem/1 "Roboto", sans-serif;
      text-align: center;

    .packaging {

    .nugget {
      width: 150px;
    }

    .nugget:hover {
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      to {
        transform: rotate(1turn);
      }
    }

    .words {
      margin: 20px 0;
    }

    .words span {
      text-shadow: 5px 5px 0 #ccc;
      font-family: "Passion One", cursive;
      font-size: 2.4rem;
      text-transform: uppercase;
    }

    html[data-theme="dark"] .words span {
      text-shadow: 4px 4px 0 #333333;
      color: #f5f5f5;
    }

    .nugget:hover~.words span {
      animation-name: pop-word;
      animation-duration: 1s;
      animation-fill-mode: forwards;
    }

    @keyframes pop-word {
      to {
        text-shadow: 5px 5px 0 yellow, 10px 10px 0 orange, 15px 15px 0 red,
          20px 20px 0 brown;
      }
    }

    .words span:nth-child(2) {
      animation-delay: 0.5s;
    }

    .words span:nth-child(3) {
      animation-delay: 1s;
    }

    .words span:nth-child(4) {
      animation-delay: 1.5s;
    }

    .words span:nth-child(5) {
      animation-delay: 2s;
    }

    /* cluck cluck font sizes bawk bagawk smaller screens */
    @media (max-width: 620px) {
      body {
        font-size: 1.25rem;
      }

      .words {
        font-size: 3rem;

    }

  <script>
    // Email link handler
    document.querySelectorAll('.js-email-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const a = "Justin.richard.hill@";
        const b = "gmail.com";
        window.open(`mailto:${a}${b}`, 'email');
      });
    });

    // Theme toggle functionality
    const themeToggleBtn = document.getElementById("theme-toggle");
    const themeToggleLightIcon = document.getElementById("theme-toggle-light-icon");
    const themeToggleDarkIcon = document.getElementById("theme-toggle-dark-icon");

    function updateIcons(theme) {
      if (theme === "dark") {
        themeToggleLightIcon?.classList.remove("hidden");
        themeToggleDarkIcon?.classList.add("hidden");
        themeToggleBtn?.setAttribute("aria-label", "Switch to light theme");
      } else {
        themeToggleLightIcon?.classList.add("hidden");
        themeToggleDarkIcon?.classList.remove("hidden");
        themeToggleBtn?.setAttribute("aria-label", "Switch to dark theme");
      }
    }

    const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
    updateIcons(currentTheme);

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener("click", () => {
        const activeTheme = document.documentElement.getAttribute("data-theme") || "light";
        const newTheme = activeTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateIcons(newTheme);
      });
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        const newTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        updateIcons(newTheme);
      }
    });
  </script>
